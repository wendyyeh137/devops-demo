name: CI/CD

on:
  push:
  pull_request:

jobs:
  test:                              # ch3 / ch4：每次 push / PR 都跑 pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest -v --cov=app --cov-fail-under=70


